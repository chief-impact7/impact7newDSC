<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impact7 DSC</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- ===== 로그인 화면 ===== -->
    <div id="login-screen" class="login-screen">
        <div class="login-card">
            <h1 class="login-title">Impact7 DSC</h1>
            <p class="login-subtitle">Daily Students Checklist</p>
            <button id="login-btn" class="login-btn" onclick="handleLogin()">
                <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
                Google 로그인
            </button>
        </div>
    </div>

    <!-- ===== 메인 화면 ===== -->
    <div id="main-screen" class="main-screen" style="display:none;">
        <!-- 상단 바 -->
        <header class="top-bar">
            <div class="top-bar-left">
                <h1 class="app-title">Impact7 DSC</h1>
                <a href="/dashboard.html" style="font-size:13px;color:var(--primary);text-decoration:none;border-left:1px solid var(--border);padding-left:12px;">대시보드</a>
            </div>
            <div class="top-bar-center">
                <button class="date-nav-btn" id="date-prev" onclick="changeDate(-1)">
                    <span class="material-symbols-outlined">chevron_left</span>
                </button>
                <button class="date-display" id="date-display" onclick="openDatePicker()">
                    <span id="date-text">2026-02-23 (월)</span>
                </button>
                <button class="date-nav-btn" id="date-next" onclick="changeDate(1)">
                    <span class="material-symbols-outlined">chevron_right</span>
                </button>
                <input type="date" id="date-picker" class="date-picker-hidden">
                <button class="date-nav-btn today-btn" onclick="goToday()" title="오늘">
                    <span class="material-symbols-outlined">today</span>
                </button>
            </div>
            <div class="top-bar-right">
                <div class="filter-group">
                    <select id="filter-branch" onchange="applyFilters()">
                        <option value="">전체 소속</option>
                        <option value="2단지">2단지</option>
                        <option value="10단지">10단지</option>
                    </select>
                    <select id="filter-class" onchange="applyFilters()">
                        <option value="">전체 반</option>
                    </select>
                </div>
                <div class="user-info">
                    <span id="user-email" class="user-email"></span>
                    <button class="avatar" onclick="handleLogin()" title="로그아웃">G</button>
                </div>
            </div>
        </header>

        <!-- 모바일 필터 바 -->
        <div class="mobile-filter-bar">
            <select id="mobile-filter-branch" onchange="applyFilters()">
                <option value="">전체</option>
                <option value="2단지">2단지</option>
                <option value="10단지">10단지</option>
            </select>
            <select id="mobile-filter-class" onchange="applyFilters()">
                <option value="">전체 반</option>
            </select>
            <span id="student-count" class="student-count">0명</span>
        </div>

        <!-- PC: 가로 스크롤 테이블 -->
        <div id="table-view" class="table-container">
            <div class="table-scroll">
                <table id="daily-table" class="daily-table">
                    <thead>
                        <tr class="section-header-row">
                            <th class="sticky-col col-name" rowspan="2">이름</th>
                            <th class="sticky-col col-class" rowspan="2">반</th>
                            <th class="sticky-col col-time" rowspan="2">시간</th>
                            <!-- 1. 출결 -->
                            <th colspan="3" class="section-header sec-attendance">출결</th>
                            <!-- 2. 숙제 -->
                            <th colspan="8" class="section-header sec-homework">숙제</th>
                            <!-- 3. 리뷰테스트 -->
                            <th colspan="4" class="section-header sec-review-test">리뷰테스트</th>
                            <!-- 4. ISC -->
                            <th colspan="1" class="section-header sec-isc">ISC</th>
                            <!-- 5. 부실 숙제 보완 -->
                            <th colspan="8" class="section-header sec-review">부실 숙제 보완</th>
                            <!-- 6. 재시 -->
                            <th colspan="6" class="section-header sec-retest">재시</th>
                            <!-- 7. 다음 숙제 -->
                            <th colspan="7" class="section-header sec-next-hw">다음 숙제</th>
                            <!-- 8. 전달사항 -->
                            <th colspan="2" class="section-header sec-notes">전달사항</th>
                            <!-- 9. 결석생 대응 -->
                            <th colspan="2" class="section-header sec-absent">결석생 대응</th>
                            <!-- 10. LMS -->
                            <th colspan="1" class="section-header sec-lms">LMS</th>
                        </tr>
                        <tr class="sub-header-row">
                            <!-- 1. 출결 -->
                            <th class="sec-attendance">출결</th>
                            <th class="sec-attendance">시간</th>
                            <th class="sec-attendance">사유</th>
                            <!-- 2. 숙제 -->
                            <th class="sec-homework">독해</th>
                            <th class="sec-homework">문법</th>
                            <th class="sec-homework">실전</th>
                            <th class="sec-homework">청해</th>
                            <th class="sec-homework">추가</th>
                            <th class="sec-homework">어휘</th>
                            <th class="sec-homework">숙어</th>
                            <th class="sec-homework">3단</th>
                            <!-- 3. 리뷰테스트 -->
                            <th class="sec-review-test">독해</th>
                            <th class="sec-review-test">문법</th>
                            <th class="sec-review-test">실전</th>
                            <th class="sec-review-test">청해</th>
                            <!-- 4. ISC -->
                            <th class="sec-isc">ISC</th>
                            <!-- 5. 부실 숙제 보완 -->
                            <th class="sec-review">독해</th>
                            <th class="sec-review">문법</th>
                            <th class="sec-review">실전</th>
                            <th class="sec-review">청해</th>
                            <th class="sec-review">추가</th>
                            <th class="sec-review">어휘</th>
                            <th class="sec-review">숙어</th>
                            <th class="sec-review">3단</th>
                            <!-- 6. 재시 -->
                            <th class="sec-retest">ISC</th>
                            <th class="sec-retest">독해</th>
                            <th class="sec-retest">문법</th>
                            <th class="sec-retest">실전</th>
                            <th class="sec-retest">청해</th>
                            <th class="sec-retest">채점</th>
                            <!-- 7. 다음 숙제 -->
                            <th class="sec-next-hw">청해</th>
                            <th class="sec-next-hw">요약</th>
                            <th class="sec-next-hw">독해</th>
                            <th class="sec-next-hw">문법</th>
                            <th class="sec-next-hw">실전</th>
                            <th class="sec-next-hw">청해2</th>
                            <th class="sec-next-hw">추가</th>
                            <!-- 8. 전달사항 -->
                            <th class="sec-notes">강의실&rarr;학습실</th>
                            <th class="sec-notes">학원&rarr;부모님</th>
                            <!-- 9. 결석생 대응 -->
                            <th class="sec-absent">담당</th>
                            <th class="sec-absent">상담내용</th>
                            <!-- 10. LMS -->
                            <th class="sec-lms">내용</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <!-- 동적 렌더링 -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 모바일: 카드 리스트 -->
        <div id="card-view" class="card-container">
            <div id="card-list" class="card-list">
                <!-- 동적 렌더링 -->
            </div>
        </div>

        <!-- 저장 상태 표시 -->
        <div id="save-indicator" class="save-indicator" style="display:none;">
            <span class="material-symbols-outlined">cloud_upload</span>
            <span id="save-text">저장 중...</span>
        </div>

        <!-- 연기 모달 -->
        <div id="postpone-modal" class="modal-overlay" onclick="closePostponeModal(event)" style="display:none;">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>연기/보강 등록</h3>
                    <button class="modal-close" onclick="document.getElementById('postpone-modal').style.display='none'">
                        <span class="material-symbols-outlined">close</span>
                    </button>
                </div>
                <div class="modal-body">
                    <div class="form-field">
                        <label class="field-label">학생</label>
                        <span id="postpone-student-name" class="field-value"></span>
                    </div>
                    <div class="form-field">
                        <label class="field-label">미룬 내용</label>
                        <input type="text" id="postpone-content" class="field-input" placeholder="예: 독해 리뷰테스트">
                    </div>
                    <div class="form-row">
                        <div class="form-field">
                            <label class="field-label">약속 날짜</label>
                            <input type="date" id="postpone-date" class="field-input">
                        </div>
                        <div class="form-field">
                            <label class="field-label">약속 시간</label>
                            <input type="time" id="postpone-time" class="field-input" value="16:00">
                        </div>
                    </div>
                    <div class="form-field">
                        <label class="field-label">담당</label>
                        <input type="text" id="postpone-handler" class="field-input" placeholder="담당 선생님">
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" onclick="document.getElementById('postpone-modal').style.display='none'">취소</button>
                    <button class="btn btn-primary" onclick="savePostponedTask()">등록</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
