name: Deploy to Firebase Hosting

on:
  push:
    branches: [master]

# 배포는 통합 호스팅(impact7-hosting)이 전담한다. 각 앱은 빌드·자체 배포를 하지 않고
# 통합 재빌드만 트리거한다. 자체 site(impact7dsc)는 impact7-app/dsc로 redirect만 하므로
# 수동 `firebase deploy`로 자체 site만 갱신돼 통합과 불일치하던 함정이 구조적으로 사라진다.
jobs:
  # 배포 트리거 전 최소 검증. Vite build와 vitest(React 컴포넌트 → firebase-config)는
  # VITE_FIREBASE_* 시크릿을 요구하는데 이 repo CI엔 없어 배포를 막았던 이력이 있어 제외한다.
  # 대신 env가 필요 없는 순수 로직 테스트(test:node)와 드리프트 체크(shared lock,
  # class_settings 필드)만 돌려 회귀·스키마 불일치를 차단한다.
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run test:node
      - run: node scripts/check-shared-lock-sync.mjs
      - run: node scripts/check-class-settings-fields.mjs

  trigger-unified:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Trigger unified hosting deploy
        run: |
          curl -s -X POST https://api.github.com/repos/chief-impact7/impact7-hosting/dispatches \
            -H "Authorization: Bearer ${{ secrets.HOSTING_DISPATCH_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -d '{"event_type":"deploy-unified"}'
