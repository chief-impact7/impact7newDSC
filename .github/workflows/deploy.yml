name: Deploy to Firebase Hosting

on:
  push:
    branches: [master]

# 배포는 통합 호스팅(impact7-hosting)이 전담한다. 각 앱은 빌드·자체 배포를 하지 않고
# 통합 재빌드만 트리거한다. 자체 site(impact7dsc)는 impact7-app/dsc로 redirect만 하므로
# 수동 `firebase deploy`로 자체 site만 갱신돼 통합과 불일치하던 함정이 구조적으로 사라진다.
jobs:
  trigger-unified:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger unified hosting deploy
        run: |
          curl -s -X POST https://api.github.com/repos/chief-impact7/impact7-hosting/dispatches \
            -H "Authorization: Bearer ${{ secrets.HOSTING_DISPATCH_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -d '{"event_type":"deploy-unified"}'
