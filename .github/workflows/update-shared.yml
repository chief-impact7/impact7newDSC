name: Update @impact7/shared

on:
  repository_dispatch:
    types: [update-shared]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Bump @impact7/shared in package.json
        run: |
          VERSION="${{ github.event.client_payload.version }}"
          sed -i "s|impact7-shared#v[0-9][^\"]*|impact7-shared#${VERSION}|g" package.json

      - run: npm install

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: @impact7/shared ${{ github.event.client_payload.version }}"
            git push
          fi
