name: Update @impact7/shared

on:
  repository_dispatch:
    types: [update-shared]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Bump @impact7/shared (package.json + lock 재해석 강제)
        # 단순 npm install은 git 태그 spec 변경 시 lock의 resolved 커밋을 갱신하지 않음 — 명시적 spec 설치로 강제
        run: |
          VERSION="${{ github.event.client_payload.version }}"
          npm install "@impact7/shared@github:chief-impact7/impact7-shared#${VERSION}"

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: @impact7/shared ${{ github.event.client_payload.version }}"
            git push
          fi
