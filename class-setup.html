<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>반생성마법사 - Impact7 DSC</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Google+Sans:wght@400;500;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="class-setup.css">
    <link rel="stylesheet" href="a11y.css">
</head>
<body>
    <div id="boot-splash" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#fff;z-index:9999;color:#6b7280;font-size:14px;">불러오는 중…</div>
    <script>/* 안전 폴백: 스크립트/인증 초기화 실패 시 스플래시가 화면을 영구히 덮지 않게 8초 후 해제 */
    setTimeout(function(){var s=document.getElementById('boot-splash');if(s){s.remove();var l=document.getElementById('login-screen');if(l)l.style.display='';}},8000);</script>
    <!-- ===== 로그인 화면 ===== -->
    <div id="login-screen" class="login-screen" style="display:none;">
        <div class="login-card">
            <h1 class="login-title">Impact7 DSC</h1>
            <p class="login-subtitle">반생성마법사</p>
            <button id="login-btn" class="login-btn" onclick="handleLogin()">
                <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
                Google 로그인
            </button>
        </div>
    </div>

    <!-- ===== 메인 화면 ===== -->
    <div id="main-screen" class="main-screen" style="display:none;">
        <!-- App Bar -->
        <header class="app-bar">
            <div class="app-bar-left">
                <a href="./" class="icon-btn" title="DSC 홈으로" aria-label="DSC 홈으로">
                    <svg class="material-symbols-outlined" viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18"/></svg>
                </a>
                <img src="https://i.imgur.com/a4XeF5x.png" alt="logo" style="height:30px;width:auto;">
                <span class="app-title">반생성마법사</span>
            </div>
            <div class="app-bar-right">
                <span id="user-email" class="user-email"></span>
                <button class="icon-btn" id="user-avatar" onclick="handleLogout()" title="로그아웃" aria-label="로그아웃">
                    <svg class="material-symbols-outlined" viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15m3 0 3-3m0 0-3-3m3 3H9"/></svg>
                </button>
            </div>
        </header>

        <!-- 마법사 컨테이너 -->
        <main class="wizard-container">
            <!-- 진행 표시 -->
            <div class="wizard-progress">
                <div class="progress-step active" data-step="1">
                    <div class="step-circle">1</div>
                    <span class="step-label">반 유형</span>
                </div>
                <div class="progress-line"></div>
                <div class="progress-step" data-step="2">
                    <div class="step-circle">2</div>
                    <span class="step-label">상세 설정</span>
                </div>
            </div>

            <!-- Step 1: 반 유형 선택 -->
            <section class="wizard-step" id="step-1">
                <h2 class="step-title">어떤 반을 만드시겠어요?</h2>
                <div class="type-cards">
                    <button class="type-card" data-type="정규" onclick="chooseClassTypeAndAdvance('정규')">
                        <svg class="material-symbols-outlined type-icon" viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4.26 10.147a60.438 60.438 0 0 0-.491 6.347A48.62 48.62 0 0 1 12 20.904a48.62 48.62 0 0 1 8.232-4.41 60.46 60.46 0 0 0-.491-6.347m-15.482 0a50.636 50.636 0 0 0-2.658-.813A59.906 59.906 0 0 1 12 3.493a59.903 59.903 0 0 1 10.399 5.84c-.896.248-1.783.52-2.658.814m-15.482 0A50.717 50.717 0 0 1 12 13.489a50.702 50.702 0 0 1 7.74-3.342M6.75 15a.75.75 0 1 0 0-1.5.75.75 0 0 0 0 1.5Zm0 0v-3.675A55.378 55.378 0 0 1 12 8.443m-7.007 11.55A5.981 5.981 0 0 0 6.75 15.75v-1.5"/></svg>
                        <span class="type-name">정규</span>
                        <span class="type-desc">레벨 + 반번호 (예: A101)</span>
                    </button>
                    <button class="type-card" data-type="내신" onclick="chooseClassTypeAndAdvance('내신')">
                        <svg class="material-symbols-outlined type-icon" viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 6.042A8.967 8.967 0 0 0 6 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 0 1 6 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 0 1 6-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0 0 18 18a8.967 8.967 0 0 0-6 2.292m0-14.25v14.25"/></svg>
                        <span class="type-name">내신</span>
                        <span class="type-desc">학교 + 학년 (예: 불곡중1A)</span>
                    </button>
                    <button class="type-card" data-type="자유학기" onclick="chooseClassTypeAndAdvance('자유학기')">
                        <svg class="material-symbols-outlined type-icon" viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 21a9.004 9.004 0 0 0 8.716-6.747M12 21a9.004 9.004 0 0 1-8.716-6.747M12 21c2.485 0 4.5-4.03 4.5-9S14.485 3 12 3m0 18c-2.485 0-4.5-4.03-4.5-9S9.515 3 12 3m0 0a8.997 8.997 0 0 1 7.843 4.582M12 3a8.997 8.997 0 0 0-7.843 4.582m15.686 0A11.953 11.953 0 0 1 12 10.5c-2.998 0-5.74-1.1-7.843-2.918m15.686 0A8.959 8.959 0 0 1 21 12c0 .778-.099 1.533-.284 2.253m0 0A17.919 17.919 0 0 1 12 16.5c-3.162 0-6.133-.815-8.716-2.247m0 0A9.015 9.015 0 0 1 3 12c0-1.605.42-3.113 1.157-4.418"/></svg>
                        <span class="type-name">자유학기</span>
                        <span class="type-desc">레벨 + 반번호 (정규와 동일 구조)</span>
                    </button>
                    <button class="type-card" data-type="특강" onclick="chooseClassTypeAndAdvance('특강')">
                        <svg class="material-symbols-outlined type-icon" viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m3.75 13.5 10.5-11.25L12 10.5h8.25L9.75 21.75 12 13.5H3.75Z"/></svg>
                        <span class="type-name">특강</span>
                        <span class="type-desc">자유 텍스트 (예: 여름특강A)</span>
                    </button>
                </div>
            </section>

            <!-- Step 2: 상세 설정 (반 이름 + 학생 + 요일/시간 + 미리보기) -->
            <section class="wizard-step" id="step-2" style="display:none;">
                <h2 class="step-title" id="step-2-title">상세 설정</h2>
                <div id="step-2-body" class="step-2-body">
                <div id="step-2-main" class="step-2-main">
                <div id="name-form" class="name-form">
                <h3 class="section-title" id="section-title-name">반 이름</h3>
                    <!-- 정규/자유학기: 레벨 + 반번호 -->
                    <div id="name-regular" style="display:none;">
                        <div class="form-row">
                            <div class="form-field">
                                <label for="input-level">레벨</label>
                                <input type="text" id="input-level" placeholder="예: A, B, P">
                            </div>
                            <div class="form-field">
                                <label for="input-class-number">반 번호</label>
                                <input type="text" id="input-class-number" placeholder="예: 101, 202">
                            </div>
                        </div>
                        <div id="free-semester-dates" class="form-row" style="display:none;">
                            <div class="form-field">
                                <label for="input-free-start">시작일</label>
                                <input type="date" id="input-free-start">
                            </div>
                            <div class="form-field">
                                <label for="input-free-end">종료일</label>
                                <input type="date" id="input-free-end">
                            </div>
                        </div>
                        <div class="class-preview" id="regular-preview"></div>
                    </div>
                    <!-- 내신: 지점 + 과정 + 학교 + 학년 + A/B -->
                    <div id="name-naesin" style="display:none;">
                        <div class="form-row">
                            <div class="form-field">
                                <label for="input-naesin-branch">지점</label>
                                <select id="input-naesin-branch">
                                    <option value="">선택</option>
                                    <option value="2단지">2단지</option>
                                    <option value="10단지">10단지</option>
                                </select>
                            </div>
                            <div class="form-field">
                                <label for="input-naesin-level">과정</label>
                                <select id="input-naesin-level">
                                    <option value="">선택</option>
                                    <option value="중">중등</option>
                                    <option value="고">고등</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-field">
                                <label for="input-school">학교</label>
                                <input type="text" id="input-school" placeholder="예: 불곡중" list="school-list">
                                <datalist id="school-list"></datalist>
                            </div>
                            <div class="form-field">
                                <label for="input-grade">학년</label>
                                <select id="input-grade">
                                    <option value="">선택</option>
                                    <option value="1">1학년</option>
                                    <option value="2">2학년</option>
                                    <option value="3">3학년</option>
                                </select>
                            </div>
                            <div class="form-field">
                                <label for="input-naesin-group">반 구분</label>
                                <select id="input-naesin-group">
                                    <option value="A">A</option>
                                    <option value="B">B</option>
                                    <option value="C">C</option>
                                    <option value="D">D</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-field">
                                <label for="input-naesin-start">내신 시작일</label>
                                <input type="date" id="input-naesin-start">
                            </div>
                            <div class="form-field">
                                <label for="input-naesin-end">내신 종료일</label>
                                <input type="date" id="input-naesin-end">
                            </div>
                        </div>
                        <div class="class-preview" id="naesin-preview"></div>
                    </div>
                    <!-- 특강: 자유 텍스트 -->
                    <div id="name-special" style="display:none;">
                        <div class="form-row">
                            <div class="form-field full">
                                <label for="input-special-name">반 이름</label>
                                <input type="text" id="input-special-name" placeholder="예: 여름특강A, 겨울캠프">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-field">
                                <label for="input-special-start">시작일</label>
                                <input type="date" id="input-special-start">
                            </div>
                            <div class="form-field">
                                <label for="input-special-end">종료일</label>
                                <input type="date" id="input-special-end">
                            </div>
                        </div>
                        <div class="form-row" style="margin-top:8px;">
                            <div class="form-field full">
                                <label>수강료</label>
                                <div style="display:flex;gap:8px;margin-top:4px;">
                                    <button class="fee-type-btn" data-fee="유료" onclick="selectFeeType('유료')" type="button" aria-pressed="false">유료</button>
                                    <button class="fee-type-btn" data-fee="무료" onclick="selectFeeType('무료')" type="button" aria-pressed="false">무료</button>
                                </div>
                            </div>
                        </div>
                        <div class="class-preview" id="special-preview"></div>
                    </div>
                    <!-- 담당 선생님 (공통) -->
                    <div class="form-row" style="margin-top:16px;">
                        <div class="form-field full">
                            <label for="input-teacher">담당 선생님</label>
                            <select id="input-teacher">
                                <option value="">선택</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- 학생 추가 -->
                <div class="form-section" id="students-section">
                    <h3 class="section-title" id="section-title-students">학생 추가</h3>
                    <div class="student-search-area">
                        <div class="search-input-wrap">
                            <svg class="material-symbols-outlined" viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z"/></svg>
                            <input type="text" id="student-search" placeholder="이름, 학교, 반 코드(I201 등) 검색..." oninput="searchStudents(this.value)" aria-label="학생 검색">
                        </div>
                        <div class="search-results" id="search-results"></div>
                    </div>
                    <div class="selected-students" id="selected-students">
                        <h4 class="selected-title">선택된 학생 (<span id="selected-count">0</span>명)</h4>
                        <div class="selected-list" id="selected-list"></div>
                    </div>
                </div>

                <!-- 요일 + 시간 -->
                <div class="form-section" id="days-section">
                    <h3 class="section-title">수업 요일 / 시간</h3>
                    <div class="day-selector">
                        <button class="day-chip" data-day="월" onclick="toggleDay('월')" aria-pressed="false">월</button>
                        <button class="day-chip" data-day="화" onclick="toggleDay('화')" aria-pressed="false">화</button>
                        <button class="day-chip" data-day="수" onclick="toggleDay('수')" aria-pressed="false">수</button>
                        <button class="day-chip" data-day="목" onclick="toggleDay('목')" aria-pressed="false">목</button>
                        <button class="day-chip" data-day="금" onclick="toggleDay('금')" aria-pressed="false">금</button>
                        <button class="day-chip" data-day="토" onclick="toggleDay('토')" aria-pressed="false">토</button>
                        <button class="day-chip" data-day="일" onclick="toggleDay('일')" aria-pressed="false">일</button>
                    </div>
                    <div class="time-settings" id="time-settings"></div>
                </div>
                </div>

                <!-- 정규/내신 공용 패널 (제목·필터·다운로드는 모드별로 동적 변경) -->
                <div class="planner-panel" id="planner-panel" style="display:none;">
                    <div class="planner-header">
                        <div>
                            <h3 class="planner-title" id="planner-title">내신반 계획</h3>
                            <p class="planner-subtitle" id="planner-subtitle">재원생을 학교/학부/학년/요일로 분류해 보여줍니다.</p>
                        </div>
                        <div class="planner-download-actions" id="planner-download-actions">
                            <button class="planner-download-btn" type="button" onclick="downloadPlanCsv()">
                                <svg class="material-symbols-outlined" viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3"/></svg>
                                CSV
                            </button>
                            <button class="planner-download-btn planner-download-btn--alt" type="button" onclick="downloadPlanXlsx()">
                                <svg class="material-symbols-outlined" viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3.375 19.5h17.25m-17.25 0a1.125 1.125 0 0 1-1.125-1.125M3.375 19.5h7.5c.621 0 1.125-.504 1.125-1.125m-9.75 0V5.625m0 12.75v-1.5c0-.621.504-1.125 1.125-1.125m18.375 2.625V5.625m0 12.75c0 .621-.504 1.125-1.125 1.125m1.125-1.125v-1.5c0-.621-.504-1.125-1.125-1.125m0 3.75h-7.5A1.125 1.125 0 0 1 12 18.375m9.75-12.75c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504-1.125 1.125m19.5 0v1.5c0 .621-.504 1.125-1.125 1.125M2.25 5.625v1.5c0 .621.504 1.125 1.125 1.125m0 0h17.25m-17.25 0h7.5c.621 0 1.125.504 1.125 1.125M3.375 8.25c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125m17.25-3.75h-7.5c-.621 0-1.125.504-1.125 1.125m8.625-1.125c.621 0 1.125.504 1.125 1.125v1.5c0 .621-.504 1.125-1.125 1.125m-17.25 0h7.5m-7.5 0c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125M12 10.875v-1.5m0 1.5c0 .621-.504 1.125-1.125 1.125M12 10.875c0 .621.504 1.125 1.125 1.125m-2.25 0c.621 0 1.125.504 1.125 1.125M13.125 12h7.5m-7.5 0c-.621 0-1.125.504-1.125 1.125M20.625 12c.621 0 1.125.504 1.125 1.125v1.5c0 .621-.504 1.125-1.125 1.125m-17.25 0h7.5M12 14.625v-1.5m0 1.5c0 .621-.504 1.125-1.125 1.125M12 14.625c0 .621.504 1.125 1.125 1.125m-2.25 0c.621 0 1.125.504 1.125 1.125m0 1.5v-1.5m0 0c0-.621.504-1.125 1.125-1.125m0 0h7.5"/></svg>
                                Excel
                            </button>
                        </div>
                    </div>
                    <div class="planner-filters">
                        <label>
                            소속
                            <select id="planner-filter-branch" onchange="renderPlanner()"></select>
                        </label>
                        <label>
                            학부
                            <select id="planner-filter-level" onchange="renderPlanner()"></select>
                        </label>
                        <label>
                            학교
                            <select id="planner-filter-school" onchange="renderPlanner()"></select>
                        </label>
                        <label>
                            학년
                            <select id="planner-filter-grade" onchange="renderPlanner()"></select>
                        </label>
                        <label>
                            등원요일
                            <select id="planner-filter-day" onchange="renderPlanner()"></select>
                        </label>
                    </div>
                    <div class="planner-stats" id="planner-stats"></div>
                    <div class="planner-groups" id="planner-groups">
                        <div class="planner-empty">학생 정보를 불러오는 중입니다.</div>
                    </div>
                </div>

                <!-- 우측 사이드: 미리보기 -->
                <aside class="step-2-side" id="step-2-side">
                    <div class="summary-panel" id="summary-panel">
                        <h3 class="section-title">미리보기</h3>
                        <div class="summary-card" id="summary-card"></div>
                    </div>
                </aside>
                </div>
            </section>

            <!-- 하단 버튼 -->
            <div class="wizard-actions">
                <button class="btn-back" id="btn-back" onclick="prevStep()" style="display:none;">
                    <svg class="material-symbols-outlined" viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18"/></svg>
                    이전
                </button>
                <div class="spacer"></div>
                <button class="btn-submit" id="btn-submit" onclick="submitWizard()" style="display:none;">
                    <svg class="material-symbols-outlined" viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m4.5 12.75 6 6 9-13.5"/></svg>
                    반 생성
                </button>
            </div>
        </main>
    </div>

    <!-- 토스트 -->
    <div class="toast-container" id="toast-container"></div>

    <script type="module" src="class-setup.js"></script>
</body>
</html>
