<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impact7 출결 체크인</title>
    <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://identitytoolkit.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="a11y.css">
    <style>
        :root {
            --canvas: #f2f0eb;       /* Neutral Warm — 페이지 캔버스 */
            --card: #ffffff;
            --accent: #00754A;       /* Green Accent — CTA */
            --brand: #006241;        /* Starbucks Green — 헤딩 */
            --house: #1E3932;        /* House Green */
            --ink: rgba(0,0,0,0.87);
            --ink-soft: rgba(0,0,0,0.58);
            --warn: #f08c00;
            --danger: #c82014;
            --card-radius: 12px;
            --pill: 50px;
            --card-shadow: 0 0 0.5px rgba(0,0,0,0.14), 0 1px 1px rgba(0,0,0,0.24);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body {
            margin: 0; height: 100%;
            font-family: Inter, "Helvetica Neue", Helvetica, Arial, sans-serif;
            letter-spacing: -0.01em;
            background: var(--canvas);
            color: var(--ink);
        }
        body { display: flex; align-items: center; justify-content: center; padding: 24px; }
        .stage { width: 100%; max-width: 520px; }
        .card {
            background: var(--card); border-radius: var(--card-radius);
            box-shadow: var(--card-shadow); padding: 32px;
        }
        h1.title { color: var(--brand); font-size: 26px; font-weight: 600; margin: 0 0 4px; }
        .subtitle { color: var(--ink-soft); font-size: 15px; margin: 0 0 24px; }

        /* 버튼 공통 — 50px pill, scale(0.95) active */
        button { font-family: inherit; letter-spacing: -0.01em; cursor: pointer; border: none; transition: all 0.2s ease; }
        button:active { transform: scale(0.95); }
        button:disabled { opacity: 0.5; cursor: default; }
        .btn-primary {
            background: var(--accent); color: #fff; border-radius: var(--pill);
            font-size: 18px; font-weight: 600; padding: 16px 24px; width: 100%;
        }
        .btn-ghost {
            background: transparent; color: var(--accent); border: 1px solid var(--accent);
            border-radius: var(--pill); font-size: 16px; font-weight: 600; padding: 12px 20px;
        }

        /* 학생번호 표시 */
        .num-display {
            display: flex; gap: 12px; justify-content: center; align-items: center;
            height: 64px; margin-bottom: 20px;
        }
        .num-dot {
            width: 44px; height: 56px; border-radius: 10px; background: var(--canvas);
            display: flex; align-items: center; justify-content: center;
            font-size: 30px; font-weight: 700; color: var(--ink);
        }
        .num-dot.filled { background: #d4e9e2; }

        /* 숫자 키패드 */
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
        .key {
            background: var(--canvas); color: var(--ink); border-radius: 16px;
            font-size: 30px; font-weight: 600; padding: 22px 0; min-height: 78px;
        }
        .key.action { background: #edebe9; font-size: 22px; color: var(--ink-soft); }

        /* 후보 목록 */
        .candidate-list { display: flex; flex-direction: column; gap: 12px; margin-top: 8px; }
        .candidate {
            background: var(--card); border: 1px solid #e7e7e7; border-radius: var(--pill);
            padding: 18px 24px; text-align: left; display: flex; align-items: baseline; gap: 12px;
        }
        .candidate .c-name { font-size: 22px; font-weight: 700; color: var(--ink); }
        .candidate .c-label { font-size: 15px; color: var(--ink-soft); }

        /* 출결 상태 버튼 */
        .status-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; margin-top: 8px; }
        .status-btn { color: #fff; border-radius: 16px; font-size: 24px; font-weight: 700; padding: 28px 0; min-height: 96px; }
        .status-present { background: var(--accent); }
        .status-late, .status-leave { background: var(--warn); }
        .status-absent { background: var(--danger); }
        .picked-name { font-size: 20px; font-weight: 700; color: var(--brand); text-align: center; margin-bottom: 16px; }

        /* 완료 화면 */
        .done { text-align: center; padding: 24px 0; }
        .done .check {
            width: 96px; height: 96px; border-radius: 50%; background: #d4e9e2; color: var(--accent);
            display: flex; align-items: center; justify-content: center; font-size: 56px; margin: 0 auto 20px;
        }
        .done .done-title { font-size: 28px; font-weight: 700; color: var(--brand); margin-bottom: 6px; }
        .done .done-sub { font-size: 17px; color: var(--ink-soft); }

        .back-link { background: transparent; color: var(--ink-soft); font-size: 15px; padding: 8px; margin-top: 18px; width: 100%; }
        .hint { color: var(--ink-soft); font-size: 14px; text-align: center; margin-top: 18px; min-height: 20px; }
        .hint.error { color: var(--danger); }
        .spinner { display: inline-block; width: 18px; height: 18px; border: 3px solid rgba(0,0,0,0.15); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }
        [hidden] { display: none !important; }
    </style>
</head>
<body>
    <div class="stage">
        <!-- 로그인(키오스크 직원 세션) -->
        <div id="screen-login" class="card" hidden>
            <h1 class="title">출결 체크인</h1>
            <p class="subtitle">키오스크를 사용하려면 직원 계정으로 로그인하세요.</p>
            <button id="login-btn" class="btn-primary">Google 로그인</button>
        </div>

        <!-- 학생번호 입력 -->
        <div id="screen-keypad" class="card" hidden>
            <h1 class="title">출결 체크인</h1>
            <p class="subtitle">학생번호 6자리를 입력하세요.</p>
            <div id="num-display" class="num-display"></div>
            <div class="keypad">
                <button class="key" data-key="1">1</button>
                <button class="key" data-key="2">2</button>
                <button class="key" data-key="3">3</button>
                <button class="key" data-key="4">4</button>
                <button class="key" data-key="5">5</button>
                <button class="key" data-key="6">6</button>
                <button class="key" data-key="7">7</button>
                <button class="key" data-key="8">8</button>
                <button class="key" data-key="9">9</button>
                <button class="key action" data-key="clear">지움</button>
                <button class="key" data-key="0">0</button>
                <button class="key action" data-key="back" aria-label="한 자리 지우기"><span data-checkin-icon="arrow_back"></span></button>
            </div>
            <div id="keypad-hint" class="hint"></div>
        </div>

        <!-- 본인 이름 확인 -->
        <div id="screen-candidates" class="card" hidden>
            <h1 class="title">본인 이름을 선택하세요</h1>
            <p class="subtitle">아래에서 본인을 찾아 누르세요.</p>
            <div id="candidate-list" class="candidate-list"></div>
            <button id="candidates-back" class="back-link"><span data-checkin-icon="arrow_back"></span> 번호 다시 입력</button>
        </div>

        <!-- 출결 상태 선택 -->
        <div id="screen-status" class="card" hidden>
            <div id="picked-name" class="picked-name"></div>
            <div class="status-grid">
                <button class="status-btn status-present" data-status="출석">출석</button>
                <button class="status-btn status-late" data-status="지각">지각</button>
                <button class="status-btn status-leave" data-status="조퇴">조퇴</button>
                <button class="status-btn status-absent" data-status="결석">결석</button>
            </div>
            <div id="status-hint" class="hint"></div>
            <button id="status-back" class="back-link"><span data-checkin-icon="arrow_back"></span> 처음으로</button>
        </div>

        <!-- 완료 -->
        <div id="screen-done" class="card" hidden>
            <div class="done">
                <div class="check"><span data-checkin-icon="check_circle"></span></div>
                <div id="done-title" class="done-title">처리됐어요</div>
                <div id="done-sub" class="done-sub"></div>
            </div>
        </div>
    </div>

    <script type="module" src="./checkin.js"></script>
</body>
</html>
